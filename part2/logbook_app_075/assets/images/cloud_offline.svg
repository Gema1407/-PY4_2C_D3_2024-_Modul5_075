<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A5568"/>
      <stop offset="100%" style="stop-color:#2D3748"/>
    </linearGradient>
    <linearGradient id="xGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FC8181"/>
      <stop offset="100%" style="stop-color:#E53E3E"/>
    </linearGradient>
  </defs>

  <!-- Cloud shape -->
  <circle cx="70"  cy="80" r="34" fill="url(#cloudGrad)"/>
  <circle cx="105" cy="65" r="38" fill="url(#cloudGrad)"/>
  <circle cx="140" cy="80" r="28" fill="url(#cloudGrad)"/>
  <rect   x="36"  y="80" width="132" height="40" rx="12" fill="url(#cloudGrad)"/>

  <!-- Cross / X mark -->
  <circle cx="148" cy="38" r="28" fill="#1A202C"/>
  <line x1="134" y1="24" x2="162" y2="52" stroke="url(#xGrad)" stroke-width="7" stroke-linecap="round"/>
  <line x1="162" y1="24" x2="134" y2="52" stroke="url(#xGrad)" stroke-width="7" stroke-linecap="round"/>
</svg>
